name: Deploy Typing Game to Vercel

on:
  push:
    branches:
      - main
      - devin/typing-game
    paths:
      - 'packages/typing-game/client/**'
      - 'packages/typing-game/shared/**'
      - 'packages/foldkit/**'
      - 'packages/foldkit-vite-plugin/**'
      - 'pnpm-lock.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build typing game client
        run: pnpm build:typing-game:client

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: packages/typing-game/client
          vercel-args: '--prod'
